name: CI - Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  test-pipeline:
    name: Test Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline_client/backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run pipeline tests
      run: |
        PYTHONPATH=. python -m pytest tests -v \
          --ignore=tests/test_agent_cloud_function.py \
          --ignore=tests/test_races_api_admin.py

  test-apis:
    name: Test API Services
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Test Races API
      run: |
        cd services/races-api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r test-requirements.txt
        PYTHONPATH=../.. python -m pytest test_races_api.py -v

    - name: Test Races API admin endpoints
      run: |
        cd services/races-api
        PYTHONPATH=../.. python -m pytest ../../tests/test_races_api_admin.py -v

  test-cloud-function:
    name: Test Agent Cloud Function
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline_client/backend/requirements.txt
        pip install -r functions/agent/requirements.txt
        pip install pytest pytest-asyncio cloudevents

    - name: Run Cloud Function tests
      run: |
        PYTHONPATH=. python -m pytest tests/test_agent_cloud_function.py -v

  test-web:
    name: Test Web Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web && npm ci

    - name: Type check
      run: |
        cd web && npm run check

    - name: Build SvelteKit
      run: |
        cd web && npm run build

    - name: Run unit tests
      run: |
        cd web && npm run test:unit -- --run

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.0

    - name: Terraform Format Check
      run: |
        cd infra
        terraform fmt -check -recursive

    - name: Terraform Validate
      run: |
        cd infra
        terraform init -backend=false
        terraform validate

  quality-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-apis, test-cloud-function, test-web, terraform-validate]
    if: always()

    steps:
    - name: Check all gates
      env:
        PIPELINE_RESULT: ${{ needs.test-pipeline.result }}
        APIS_RESULT: ${{ needs.test-apis.result }}
        CF_RESULT: ${{ needs.test-cloud-function.result }}
        WEB_RESULT: ${{ needs.test-web.result }}
        TERRAFORM_RESULT: ${{ needs.terraform-validate.result }}
      run: |
        echo "test-pipeline:       $PIPELINE_RESULT"
        echo "test-apis:           $APIS_RESULT"
        echo "test-cloud-function: $CF_RESULT"
        echo "test-web:            $WEB_RESULT"
        echo "terraform-validate:  $TERRAFORM_RESULT"
        if [[ "$PIPELINE_RESULT" != "success" || "$APIS_RESULT" != "success" || "$CF_RESULT" != "success" || "$WEB_RESULT" != "success" || "$TERRAFORM_RESULT" != "success" ]]; then
          echo "❌ One or more CI gates failed"
          exit 1
        fi
        echo "✅ All CI gates passed — ready for deployment"
